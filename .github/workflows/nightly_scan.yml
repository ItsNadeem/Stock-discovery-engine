name: Nightly NSE Multibagger Scan

on:
  # ── Runs at 13:15 UTC = 18:45 IST, Mon–Fri (15 min after NSE close) ──
  schedule:
    - cron: "15 13 * * 1-5"

  # ── Trigger manually from the Actions tab ──
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual run"
        required: false
        default: "Manual trigger"

jobs:
  scan:
    name: Run Multibagger Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare results dir
        run: mkdir -p results

      - name: Run Full Multibagger Pipeline
        run: python run_all.py

      - name: Send email report
        env:
          # ── SendGrid (recommended — no App Password needed) ──
          # Set SENDGRID_API_KEY + NOTIFY_EMAIL + SENDER_EMAIL in repo secrets
          SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
          SENDER_EMAIL:      ${{ secrets.SENDER_EMAIL }}
          # ── Gmail fallback (needs App Password) ──
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:        ${{ secrets.GMAIL_PASS }}
          # ── Required for both methods ──
          NOTIFY_EMAIL:      ${{ secrets.NOTIFY_EMAIL }}
        run: python send_report.py
        continue-on-error: true

      - name: Commit scan results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --staged --quiet || git commit -m "scan: $(date -u '+%Y-%m-%d') nightly results [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: multibagger-scan-${{ github.run_id }}
          path: |
            results/daily_report.txt
            results/latest.json
            results/watchlist.json
            results/conviction.json
            results/regime.json
          retention-days: 30

      - name: Write job summary
        run: |
          echo "## NSE Scan — $(date -u '+%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Market Regime" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python -c "
          import json
          r = json.load(open('results/regime.json'))
          print(f\"Regime: {r.get('regime','?')}  —  {r.get('regime_note','')}\")
          sc = r.get('smallcap100') or {}
          if sc:
              print(f\"SC100: {sc.get('last','?')}  1M: {sc.get('chg_1m_pct','?'):+.1f}%  3M: {sc.get('chg_3m_pct','?'):+.1f}%\")
          " >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "### Conviction Plays" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python -c "
          import json
          data = json.load(open('results/conviction.json'))
          if data:
              for s in data[:5]:
                  t = s.get('technical', {})
                  print(f\"{s['symbol']:<16} Score:{s['combined_score']:.3f}  Rs{t.get('rs_days','?')}d  OBV:{'Y' if t.get('obv_bullish') else 'N'}\")
          else:
              print('No conviction plays today')
          " >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "### Top Breakouts (L1)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python -c "
          import json
          data = json.load(open('results/latest.json'))
          if data:
              for s in data[:5]:
                  fd = s.get('fundamentals', {})
                  print(f\"{s['symbol']:<16} {s['composite_score']:.3f}  RSI:{s['rsi']}  FCF:{fd.get('fcf_yield_pct','N/A')}%\")
          else:
              print('No breakouts today')
          " >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "### Pre-Breakout Watchlist (L2)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python -c "
          import json
          data = json.load(open('results/watchlist.json'))
          for s in data[:5]:
              p = s.get('piotroski', {}).get('piotroski_score')
              f = s.get('fcf', {}).get('fcf_yield_pct')
              print(f\"{s['symbol']:<16} {s['composite_score']:.3f}  F:{p}/9  FCF:{f}%\")
          " >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
