name: Weekly Backtest & Signal Validation

on:
 
  # ── Monthly: 1st of month 06:00 IST (00:30 UTC) — full 1,800-symbol run ──
  # Gives a statistically robust signal count (~500-1000 signals vs ~51)
  # for weight tuning and false-positive rate measurement
  schedule:
    - cron: "30 0 1 * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "Backtest mode"
        required: false
        default: "both"
        type: choice
        options: [both, a, b]
      tune_weights:
        description: "Run weight tuning?"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      full_universe:
        description: "Run on full NSE universe (~1,800 symbols, ~11 min)?"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  backtest:
    name: Run Backtest & Signal Validation
    runs-on: ubuntu-latest
    timeout-minutes: 60    # full universe needs ~11 min + buffer

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare results dir
        run: mkdir -p results

      - name: Run Backtest
        run: |
          MODE="${{ github.event.inputs.mode || 'both' }}"
          TUNE="${{ github.event.inputs.tune_weights || 'false' }}"
          FULL="${{ github.event.inputs.full_universe || 'false' }}"

          # Monthly scheduled run always uses full universe
          if [ "${{ github.event_name }}" = "schedule" ]; then
            CRON="${{ github.event.schedule }}"
            if [ "$CRON" = "30 0 1 * *" ]; then
              FULL="true"
              MODE="b"
            fi
          fi

          CMD="python backtest.py --mode $MODE"
          [ "$TUNE" = "true" ] && CMD="$CMD --tune"
          [ "$FULL" = "true" ] && CMD="$CMD --full"

          echo "Running: $CMD"
          $CMD

      - name: Commit backtest results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/backtest_*.txt results/backtest_*.json
          git diff --staged --quiet || git commit -m "backtest: $(date -u '+%Y-%m-%d') results [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload backtest artifact
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ github.run_id }}
          path: results/backtest_*.txt
          retention-days: 90

      - name: Write job summary
        run: |
          echo "## Backtest Results — $(date -u '+%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          LATEST=$(ls -t results/backtest_*.txt 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            head -100 "$LATEST" >> $GITHUB_STEP_SUMMARY
          else
            echo "No backtest output found" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Email backtest summary
        env:
          GMAIL_USER:    ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:    ${{ secrets.GMAIL_PASS }}
          NOTIFY_EMAIL:  ${{ secrets.NOTIFY_EMAIL }}
        run: |
          python - <<'EOF'
          import os, json, smtplib, glob
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from datetime import datetime

          files = sorted(glob.glob("results/backtest_*.json"), reverse=True)
          if not files:
              print("No backtest JSON — skipping email"); exit(0)

          with open(files[0]) as f:
              data = json.load(f)

          b = data.get("backtest_b", {})
          all_m = b.get("all_signals", {})
          obv_m = b.get("with_obv",    {})
          vol_m = b.get("with_vol",    {})
          params = data.get("params", {})
          is_full = params.get("full", False)

          date_str = datetime.utcnow().strftime("%d %b %Y")
          scope    = "Full universe (~1,800)" if is_full else "48 curated stocks"
          subject  = f"📊 Backtest {date_str} — {scope} — {all_m.get('count','?')} signals"

          def row(label, val, highlight=False):
              color = "#16a34a" if highlight else "#111"
              return (f'<tr style="border-bottom:1px solid #f1f5f9">'
                      f'<td style="padding:6px 10px;color:#6b7280">{label}</td>'
                      f'<td style="padding:6px 10px;font-weight:500;color:{color}">{val}</td></tr>')

          rows = (
              row("Scope", scope) +
              row("Signals found", all_m.get("count","?")) +
              row("Hit rate (3M positive)", f"{all_m.get('hit_rate_3m','?')}%") +
              row("Avg 3M return (all)",    f"{all_m.get('avg_return_3m','?')}%") +
              row("Avg 3M (OBV confirmed)", f"{obv_m.get('avg_return_3m','?')}%", True) +
              row("Avg 3M (Vol surge)",     f"{vol_m.get('avg_return_3m','?')}%", True) +
              row("Avg alpha vs Nifty",     f"{all_m.get('avg_alpha_3m','?')}%") +
              row("Best 3M signal",         f"{all_m.get('best_3m','?')}%") +
              row("Worst 3M signal",        f"{all_m.get('worst_3m','?')}%") +
              row("OBV lift",
                  f"+{round(float(obv_m.get('avg_return_3m',0) or 0) - float(b.get('without_obv',{}).get('avg_return_3m',0) or 0),1)}% vs no-OBV")
          )

          txt_file = sorted(glob.glob("results/backtest_*.txt"), reverse=True)
          preview  = open(txt_file[0]).read()[:2500] if txt_file else ""

          html = f"""<html><body style="font-family:-apple-system,sans-serif;max-width:640px;margin:0 auto;padding:20px">
          <div style="background:#0f172a;border-radius:8px 8px 0 0;padding:16px 20px">
            <div style="color:#94a3b8;font-size:11px;text-transform:uppercase">Backtest Report</div>
            <div style="color:#fff;font-size:20px;font-weight:600;margin-top:4px">Signal Validation — {date_str}</div>
            <div style="color:#64748b;font-size:12px;margin-top:4px">{scope}</div>
          </div>
          <div style="background:#fff;border:1px solid #e5e7eb;border-radius:0 0 8px 8px;padding:20px">
            <table width="100%" style="border-collapse:collapse;font-size:13px">{rows}</table>
            <div style="margin-top:20px;background:#f8fafc;border-radius:6px;padding:12px;
                        font-family:monospace;font-size:11px;white-space:pre;overflow:auto;
                        max-height:500px">{preview}</div>
            <div style="margin-top:12px;font-size:11px;color:#9ca3af">
              ⚠ Survivorship bias present. Use directionally, not as proof.
            </div>
          </div></body></html>"""

          notify = os.environ.get("NOTIFY_EMAIL","")
          if not notify: print("NOTIFY_EMAIL not set"); exit(0)

          gmail_user = os.environ.get("GMAIL_USER","").strip()
          gmail_pass = "".join(os.environ.get("GMAIL_PASS","").split())
          if not gmail_user or not gmail_pass: print("No Gmail creds"); exit(0)

          msg = MIMEMultipart("alternative")
          msg["Subject"] = subject
          msg["From"]    = f"Multibagger Engine <{gmail_user}>"
          msg["To"]      = notify
          msg.attach(MIMEText(html,"html"))
          with smtplib.SMTP_SSL("smtp.gmail.com",465) as s:
              s.login(gmail_user, gmail_pass)
              s.sendmail(gmail_user, notify, msg.as_string())
          print(f"✅ Email sent to {notify}")
          EOF
        continue-on-error: true
